name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Bootstrap: create v1.0.0 if this repo has never had a release ───────────
  bootstrap:
    name: Bootstrap Initial Release
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.b.outputs.bootstrapped }}
    steps:
      - name: Bootstrap or re-dispatch if release has no binary assets
        id: b
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 1
            })

            let tagName = 'v1.0.0'

            if (releases.length === 0) {
              // No releases at all — create the initial tag so goreleaser can publish
              const { data: branch } = await github.rest.repos.getBranch({
                owner: context.repo.owner, repo: context.repo.repo, branch: 'main'
              })
              try {
                await github.rest.git.createRef({
                  owner: context.repo.owner, repo: context.repo.repo,
                  ref: 'refs/tags/v1.0.0', sha: branch.commit.sha
                })
                console.log('Bootstrap: created tag v1.0.0')
              } catch (e) {
                if (!e.message?.includes('already exists')) throw e
                console.log('Bootstrap: tag v1.0.0 already exists')
              }
              // Do NOT create the GitHub Release here — let goreleaser do it with full artifacts
            } else {
              tagName = releases[0].tag_name
              // Check if the latest release has real binary assets
              const binaryAssets = releases[0].assets.filter(a =>
                a.name.endsWith('.tar.gz') || a.name.endsWith('.zip') || a.name === 'checksums.txt'
              )
              if (binaryAssets.length > 0) {
                console.log(`Release ${tagName} already has ${binaryAssets.length} asset(s) — nothing to do`)
                core.setOutput('bootstrapped', 'false')
                return
              }
              console.log(`Release ${tagName} exists but has no binary assets — re-dispatching goreleaser`)
            }

            // Dispatch release.yml to build binaries + docker for this tag
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: tagName,
              inputs: { tag: tagName }
            })
            core.setOutput('bootstrapped', 'true')
            console.log(`Dispatched release.yml for ${tagName}`)

  # ── Release Please: ongoing version bumps from conventional commits ─────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          token:         ${{ secrets.GITHUB_TOKEN }}

  # ── After release PR merges: dispatch release.yml at the new tag ─────────────
  trigger-release:
    name: Trigger Release Workflow
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Dispatch release workflow for tag ${{ needs.release-please.outputs.tag_name }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: {
                tag: '${{ needs.release-please.outputs.tag_name }}',
              },
            })
