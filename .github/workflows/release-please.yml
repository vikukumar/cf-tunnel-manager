name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Bootstrap: create v1.0.0 if this repo has never had a release ───────────
  bootstrap:
    name: Bootstrap Initial Release
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.b.outputs.bootstrapped }}
    steps:
      - name: Bootstrap or re-dispatch if release has no binary assets
        id: b
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 1
            })

            // Get current HEAD of main
            const { data: branch } = await github.rest.repos.getBranch({
              owner: context.repo.owner, repo: context.repo.repo, branch: 'main'
            })
            const headSha = branch.commit.sha

            let tagName = 'v1.0.0'

            if (releases.length > 0) {
              tagName = releases[0].tag_name
              const binaryAssets = releases[0].assets.filter(a =>
                a.name.endsWith('.tar.gz') || a.name.endsWith('.zip') || a.name === 'checksums.txt'
              )
              if (binaryAssets.length > 0) {
                console.log(`Release ${tagName} already has ${binaryAssets.length} asset(s) — nothing to do`)
                core.setOutput('bootstrapped', 'false')
                return
              }
              console.log(`Release ${tagName} exists but has no binary assets — will re-build`)
            }

            // Force-move (or create) the tag to the current main HEAD so the
            // release workflow checks out code with all the latest fixes.
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `tags/${tagName}`,
                sha: headSha,
                force: true
              })
              console.log(`Tag ${tagName} moved to HEAD (${headSha})`)
            } catch (e) {
              // Tag doesn't exist yet — create it
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: headSha
              })
              console.log(`Tag ${tagName} created at HEAD (${headSha})`)
            }

            // Dispatch release.yml to build binaries + docker for this tag
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: tagName,
              inputs: { tag: tagName }
            })
            core.setOutput('bootstrapped', 'true')
            console.log(`Dispatched release.yml for ${tagName}`)

  # ── Release Please: ongoing version bumps from conventional commits ─────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          token:         ${{ secrets.GITHUB_TOKEN }}

  # ── After release PR merges: dispatch release.yml at the new tag ─────────────
  trigger-release:
    name: Trigger Release Workflow
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Dispatch release workflow for tag ${{ needs.release-please.outputs.tag_name }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: {
                tag: '${{ needs.release-please.outputs.tag_name }}',
              },
            })
