name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Bootstrap: create v1.0.0 if this repo has never had a release ───────────
  bootstrap:
    name: Bootstrap Initial Release
    runs-on: ubuntu-latest
    outputs:
      bootstrapped: ${{ steps.b.outputs.bootstrapped }}
    steps:
      - name: Create v1.0.0 release if none exists
        id: b
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner, repo: context.repo.repo, per_page: 1
            })
            if (releases.length > 0) {
              console.log('Releases already exist, skipping bootstrap')
              core.setOutput('bootstrapped', 'false')
              return
            }
            const { data: branch } = await github.rest.repos.getBranch({
              owner: context.repo.owner, repo: context.repo.repo, branch: 'main'
            })
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner, repo: context.repo.repo,
                ref: 'refs/tags/v1.0.0', sha: branch.commit.sha
              })
            } catch (e) {
              if (!e.message?.includes('already exists')) throw e
            }
            await github.rest.repos.createRelease({
              owner: context.repo.owner, repo: context.repo.repo,
              tag_name: 'v1.0.0',
              name: 'cloudflare-tunnel-ui v1.0.0',
              body: '## Initial Release\n\nFirst public release of Cloudflare Tunnel UI.',
              draft: false, prerelease: false
            })
            core.setOutput('bootstrapped', 'true')
            console.log('Bootstrap: created v1.0.0 release and tag')

      - name: Trigger release workflow for v1.0.0
        if: steps.b.outputs.bootstrapped == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'release.yml',
              ref: 'v1.0.0',
              inputs: { tag: 'v1.0.0' }
            })

  # ── Release Please: ongoing version bumps from conventional commits ─────────
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: bootstrap
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json
          token:         ${{ secrets.GITHUB_TOKEN }}

  # ── After release PR merges: dispatch release.yml at the new tag ─────────────
  trigger-release:
    name: Trigger Release Workflow
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    steps:
      - name: Dispatch release workflow for tag ${{ needs.release-please.outputs.tag_name }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'release.yml',
              ref: '${{ needs.release-please.outputs.tag_name }}',
              inputs: {
                tag: '${{ needs.release-please.outputs.tag_name }}',
              },
            })
