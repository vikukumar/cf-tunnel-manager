name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.2.3)'
        required: false

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Resolve the effective tag across all trigger types ───────────────────────
  resolve:
    name: Resolve Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.t.outputs.tag }}
    steps:
      - name: Determine tag
        id: t
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  # ── Build frontend once and share as artifact ────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: resolve
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Build frontend
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: cmd/server/web/dist/
          retention-days: 1

  # ── Cross-platform Go binaries via GoReleaser ────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: [resolve, build-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: cmd/server/web/dist/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image → GHCR ─────────────────────────────────────────────────────
  docker:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    needs: [resolve, build-frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: cmd/server/web/dist/

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve.outputs.tag }}
            type=semver,pattern={{major}},value=${{ needs.resolve.outputs.tag }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.resolve.outputs.tag }}
            COMMIT=${{ github.sha }}
            BUILDDATE=${{ github.event.repository.updated_at }}

  # ── Publish GitHub Release notes ─────────────────────────────────────────────
  release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: [resolve, goreleaser, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append Docker pull instructions to release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ needs.resolve.outputs.tag }}'
            const repo = context.repo
            const releases = await github.rest.repos.listReleases({ owner: repo.owner, repo: repo.repo })
            const rel = releases.data.find(r => r.tag_name === tag)
            if (!rel) return
            const dockerNote = `\n\n---\n\n## 🐳 Docker\n\`\`\`bash\ndocker pull ghcr.io/${repo.owner}/${repo.repo}:${tag}\ndocker run -p 8080:8080 --env-file .env ghcr.io/${repo.owner}/${repo.repo}:${tag}\n\`\`\``
            await github.rest.repos.updateRelease({
              owner: repo.owner,
              repo: repo.repo,
              release_id: rel.id,
              body: (rel.body || '') + dockerNote
            })
