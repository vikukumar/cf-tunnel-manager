name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # ── Build frontend once and cache ────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Build frontend
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: cmd/server/web/dist/
          retention-days: 1

  # ── Cross-platform Go binaries via GoReleaser ────────────────────────────────
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: cmd/server/web/dist/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Docker image → GHCR ─────────────────────────────────────────────────────
  docker:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v6

      - name: Download frontend dist
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: cmd/server/web/dist/

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILDDATE=${{ github.event.repository.updated_at }}

  # ── Publish GitHub Release notes ─────────────────────────────────────────────
  release-notes:
    name: Update Release Notes
    runs-on: ubuntu-latest
    needs: [goreleaser, docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Append Docker pull instructions to release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const repo = context.repo
            const releases = await github.rest.repos.listReleases({ owner: repo.owner, repo: repo.repo })
            const rel = releases.data.find(r => r.tag_name === tag)
            if (!rel) return
            const dockerNote = `\n\n---\n\n## 🐳 Docker\n\`\`\`bash\ndocker pull ghcr.io/${repo.owner}/${repo.repo}:${tag}\ndocker run -p 8080:8080 --env-file .env ghcr.io/${repo.owner}/${repo.repo}:${tag}\n\`\`\``
            await github.rest.repos.updateRelease({
              owner: repo.owner,
              repo: repo.repo,
              release_id: rel.id,
              body: (rel.body || '') + dockerNote
            })
