name: Feature Request
description: Suggest a new feature or improvement for Cloudflare Tunnel UI
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please fill in the details below so we can understand your use case.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe clearly what you're trying to do and what's currently preventing you from doing it.
      placeholder: "I'm always frustrated when I try to ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see. Be as specific as possible about the UI / API / behavior you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or considered alternative solutions? Why do they fall short?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which part of the application does this feature relate to?
      options:
        - UI / Dashboard
        - Tunnel Management
        - Application Routes / Hostname Management
        - Connector / Server Details
        - Authentication / Access Control
        - API
        - CLI
        - Docker / Deployment
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority to You
      options:
        - "Nice to have"
        - "Would significantly improve my workflow"
        - "Blocking — cannot use the project without it"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add screenshots, mockups, links to similar features in other tools, or any other context here.

  - type: checkboxes
    id: implement
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a pull request to implement this feature

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
