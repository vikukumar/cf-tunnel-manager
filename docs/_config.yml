title: Cloudflare Tunnel UI
description: >-
  Enterprise-grade web UI for managing Cloudflare Tunnels — app routes,
  network routes, live logs, dark mode, and more.
url: ""

theme: just-the-docs

# Site structure
nav_sort: case_insensitive
nav_external_links:
  - title: GitHub
    url: https://github.com/vikukumar/cf-tunnel-manager
    hide_icon: false

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Color scheme
color_scheme: light

# Footer
footer_content: >
  &copy; 2025–2026 Cloudflare Tunnel UI contributors.
  Distributed under the <a href="https://github.com/vikukumar/cf-tunnel-manager/blob/main/LICENSE">MIT License</a>.

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Aux links
aux_links:
  "GitHub":
    - "https://github.com/vikukumar/cf-tunnel-manager"
aux_links_new_tab: true

# Back to top button
back_to_top: true
back_to_top_text: "Back to top"

# Call-outs
callouts_level: loud
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red
